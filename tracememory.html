// ─── Utilities ───────────────────────────────────────────────────────────────
function nav(p) {
  page = p;
  demoStep = 0;
  inspectorOpen = false;
  render();
  window.scrollTo(0, 0);
}

function login() {
  signedIn = true;
  page = 'console';
  render();
  window.scrollTo(0, 0);
}

function logout() {
  signedIn = false;
  page = 'home';
  render();
  window.scrollTo(0, 0);
}

function advanceStage() {
  if (demoStep < 5) {
    demoStep++;
    render();
    setTimeout(() => {
      const chat = document.getElementById('chat-area');
      if (chat) chat.scrollTop = chat.scrollHeight;
    }, 50);
  }
}

function pickScenario(s) {
  scenario = s;
  demoStep = 0;
  render();
}

function toggleInspector() {
  inspectorOpen = !inspectorOpen;
  render();
}

  if (page === 'home') app.innerHTML = home();

  else if (page === 'architecture') app.innerHTML = architecture();
  else if (page === 'solutions') app.innerHTML = solutionsPage();
  else if (page === 'developers') app.innerHTML = developers();
  else if (page === 'integrations') app.innerHTML = integrationsPage();
  else if (page === 'console') app.innerHTML = consoleView();
  else if (page === 'agent') app.innerHTML = agent();
  else app.innerHTML = home();
}

render();
</script>
</body>
